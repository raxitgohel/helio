<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Streaming Home — 3 Directions</title>
<style>
  html, body { margin: 0; padding: 0; background: #e8e6df; }
  #root { width: 100%; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="options/option-a-programme.jsx"></script>
<script type="text/babel" src="options/option-b-ambient.jsx"></script>
<script type="text/babel" src="options/option-c-index.jsx"></script>
<script type="text/babel" src="options/option-d-ambient-index.jsx"></script>
<script type="text/babel" src="options/option-e-soft-index.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="streaming-home"
          title="Streaming · Home screen"
          subtitle="Three premium directions — different look AND editorial voice. Open any one fullscreen (click ⤢)."
        >
          <DCArtboard id="a" label="A · The Programme — editorial, warm, curated" width={1440} height={1850}>
            <window.OptionAProgramme />
          </DCArtboard>
          <DCArtboard id="b" label="B · Ambient — immersive, cool, mood-first" width={1440} height={1200}>
            <window.OptionBAmbient />
          </DCArtboard>
          <DCArtboard id="c" label="C · Index — precision-luxe, paper + acid accent" width={1440} height={1135}>
            <window.OptionCIndex />
          </DCArtboard>
          <DCArtboard id="d" label="D · Ambient Index (B×C) — built in Helio's system" width={1440} height={1660}>
            <window.OptionDAmbientIndex />
          </DCArtboard>
          <DCArtboard id="e" label="E · Soft Index — C's structure, softened for entertainment" width={1440} height={1300}>
            <window.OptionESoftIndex />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
